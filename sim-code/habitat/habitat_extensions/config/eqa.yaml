SEED: 0
ENVIRONMENT:
  MAX_EPISODE_STEPS: 500
SIMULATOR:
  ACTION_SPACE_CONFIG: v1
  AGENT_0:
    SENSORS: [RGB_SENSOR, DEPTH_SENSOR]
    HEIGHT: 0.88
    RADIUS: 0.1
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 30
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
    ALLOW_SLIDING: True
  RGB_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    POSITION: [0, 0.88, 0]
    TYPE: HabitatSimRGBSensor
  DEPTH_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    MIN_DEPTH: 0.1
    MAX_DEPTH: 5.0
    POSITION: [0, 0.88, 0]
  TYPE:
    Sim-v1
TASK:
  TYPE: EQA-v0
  SUCCESS_DISTANCE: 3.0
  SENSORS: [
    EQA_QUESTION_SENSOR,
    SENSOR_POSE_SENSOR,
    POSITION_SENSOR,
    HEADING_SENSOR
  ]
  EQA_QUESTION_SENSOR:
    TYPE: QuestionSensor
    QUESTION_SENSOR_UUID: question
  ALLOW_NAVIGATION: True
  POSSIBLE_ACTIONS: [STOP, MOVE_FORWARD, TURN_LEFT, TURN_RIGHT, LOOK_UP, LOOK_DOWN,ANSWER]
  MEASUREMENTS: [
    EQAAnswerAccuracy
  ]
  EQAAnswerAccuracy:
      TYPE: AnswerAccuracy
DATASET:
  TYPE: MP3DEQA-v1
  SPLIT: val_unseen
  DATA_PATH: data/datasets/episodes/mp3d_eqa.json.gz
  SCENES_DIR: data/scene_datasets/