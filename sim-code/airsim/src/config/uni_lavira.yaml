  # --------------------------------------------------------------------------
    GROUNDING_DINO_CONFIG_PATH: "data/grounded_sam/GroundingDINO_SwinT_OGC.py"
    GROUNDING_DINO_CHECKPOINT_PATH: "data/grounded_sam/groundingdino_swint_ogc.pth"
    SAM_CHECKPOINT_PATH: "data/grounded_sam/sam_vit_h_4b8939.pth"
    RepViTSAM_CHECKPOINT_PATH: "data/grounded_sam/repvit_sam.pt"
    SAM_ENCODER_VERSION: "vit_h"
    REPVITSAM: 1

  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
    BOX_THRESHOLD: 0.25
    TEXT_THRESHOLD: 0.25

  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
    FRAME_WIDTH: 160
    FRAME_HEIGHT: 120
    MAP_RESOLUTION: 5
    MAP_SIZE_CM: 2400
    GLOBAL_DOWNSCALING: 2

  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
    VISION_RANGE: 100
    HFOV: 79
    AGENT_HEIGHT: 0.88

  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
    DU_SCALE: 1
    CAT_PRED_THRESHOLD: 5.0
    EXP_PRED_THRESHOLD: 1.0
    MAP_PRED_THRESHOLD: 1.0
